name: Supabase — deploy Edge Functions

# Deploys changed Edge Functions when files under supabase/functions change on
# main. Only the functions touched by the push are deployed — unless shared code
# (_shared) changed, in which case all functions are redeployed.
#
# Required repo secrets (same as the migrations workflow):
#   SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_ID

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch: {} # allow manual "Run workflow" from the Actions tab

concurrency:
  group: supabase-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # need the previous commit to diff what changed

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy changed functions
        run: |
          set -euo pipefail
          BEFORE='${{ github.event.before }}'
          SHA='${{ github.sha }}'
          # On a brand-new branch github.event.before is all-zeros; fall back to parent.
          if ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            BEFORE="$(git rev-parse "${SHA}~1")"
          fi

          CHANGED_DIRS="$(git diff --name-only "$BEFORE" "$SHA" -- supabase/functions | cut -d/ -f3 | sort -u)"
          echo "Changed under supabase/functions:"; echo "$CHANGED_DIRS"

          if echo "$CHANGED_DIRS" | grep -qx '_shared'; then
            echo "Shared code changed → deploying ALL functions"
            supabase functions deploy --project-ref "$PROJECT_ID"
            exit 0
          fi

          FNS="$(echo "$CHANGED_DIRS" | grep -vE '^_|^$' || true)"
          if [ -z "$FNS" ]; then
            echo "No deployable function changed."; exit 0
          fi
          for fn in $FNS; do
            # A function whose directory was removed shows up in the diff but can
            # no longer be deployed — skip it (delete it in the dashboard if the
            # remote copy should go too).
            if [ ! -d "supabase/functions/$fn" ]; then
              echo "── Skipping $fn (removed from repo)"
              continue
            fi
            echo "── Deploying $fn"
            supabase functions deploy "$fn" --project-ref "$PROJECT_ID"
          done
