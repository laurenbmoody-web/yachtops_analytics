name: Supabase — apply migrations

# Applies any pending SQL migrations to the linked Supabase project whenever
# files under supabase/migrations change on main. Replaces the manual
# "paste the new migration into the dashboard after each merge" step.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  – Personal access token (supabase.com/dashboard/account/tokens)
#   SUPABASE_DB_PASSWORD   – Project DB password (Project Settings → Database)
#   SUPABASE_PROJECT_ID    – Project ref, e.g. gwexbrbasfysbheeklyq (Project Settings → General)
#
# ⚠ One-time before relying on this: the project's migration history must be
#   baselined so `db push` doesn't try to re-run already-applied migrations.
#   See README / the PR notes for the `supabase migration repair` step.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch: {} # allow manual "Run workflow" from the Actions tab

# Never let two migration pushes run at once.
concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$PROJECT_ID"

      - name: Show pending migrations
        continue-on-error: true # informational only — a flaky list must not block the apply
        run: supabase migration list

      - name: Auto-heal history drift
        # Any 14-digit version present on the REMOTE column but missing
        # from the LOCAL column is an orphan — usually a Studio-applied
        # one-off whose SQL file never landed in supabase/migrations/.
        # `db push` refuses to run while orphans exist, so we
        # auto-`migration repair --status reverted` them here. This
        # only touches the `supabase_migrations.schema_migrations`
        # history table — the SQL effects of the orphan (created
        # tables, columns, etc.) stay untouched.
        #
        # The bash parsing reads `supabase migration list` and emits
        # versions where column 1 (LOCAL) is empty but column 2
        # (REMOTE) is a 14-digit timestamp. The header / divider rows
        # never match because column 2 isn't all digits there.
        #
        # Failure here MUST block — if the parse went wrong we'd
        # rather see an empty list and fall through to db push than
        # silently lose history rows.
        run: |
          set -e
          # `migration list` exits with the project's `db push` advice
          # text on stderr; we only care about stdout for the table.
          listing=$(supabase migration list 2>/dev/null || true)
          if [ -z "$listing" ]; then
            echo "::warning::Empty migration list — skipping drift heal."
            exit 0
          fi
          orphans=$(printf '%s\n' "$listing" \
            | awk -F'|' '{
                local = $1; remote = $2;
                gsub(/[ \t]+/, "", local);
                gsub(/[ \t]+/, "", remote);
                if (local == "" && remote ~ /^[0-9]{14}$/) print remote;
              }')
          if [ -z "$orphans" ]; then
            echo "No orphan migration versions on remote — history is clean."
            exit 0
          fi
          echo "Found orphan migration versions on remote:"
          printf '  - %s\n' $orphans
          for v in $orphans; do
            echo "::notice::Marking $v as reverted (was an orphan in remote history)."
            supabase migration repair --status reverted "$v"
          done

      - name: Apply migrations
        # Retry: the pooler occasionally i/o-times-out on connect; db push is
        # safe to re-attempt (already-applied migrations are skipped via history).
        #
        # `--include-all` lets CLI insert out-of-order migrations whose
        # version is older than the last applied remote one. We hit this
        # whenever two engineers cut migrations with overlapping prefixes
        # (e.g. 20260615150000_X applied via Studio while 20260615150000_Y
        # waited on the branch). Without the flag, db push refuses and
        # prints exactly this advice — so we may as well take it.
        run: |
          set -e
          for i in 1 2 3; do
            if supabase db push --include-all; then exit 0; fi
            echo "::warning::db push attempt $i failed; retrying in 10s…"
            sleep 10
          done
          echo "::error::db push failed after 3 attempts"
          exit 1

