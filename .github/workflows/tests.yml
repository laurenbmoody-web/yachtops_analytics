name: Tests

# Pure-logic unit tests via Node's built-in runner (no deps to install).
# Currently the rest-engine day-basis cases; add more *.test.mjs alongside.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  node-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node --test src/pages/crew-rota/*.test.mjs
